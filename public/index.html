<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Sayur Mart</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #5A5A40 0%, #a3b18a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #5A5A40;
            font-size: 3em;
            margin-bottom: 20px;
        }
        .success {
            color: #10b981;
            font-size: 5em;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 1.2em;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            background: #5A5A40;
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            text-decoration: none;
            margin-top: 30px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .button:hover {
            background: #a3b18a;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">✅</div>
        <h1>Server Berjalan!</h1>
        <p>Jika Anda melihat halaman ini, server sudah berjalan dengan baik.</p>
        <p><strong>Langkah selanjutnya:</strong></p>
        <p>Tutup tab ini dan buka:</p>
        <a href="/" class="button">Buka Aplikasi Utama</a>
    </div>
</body>
</html>
